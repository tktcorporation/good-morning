# Changeset ベースのリリースワークフロー
#
# main push 時に changesets/action が動作:
#   - 未消費の changeset があれば "Version Packages" PR を作成
#   - Version PR がマージされた push では published=true → EAS ビルド実行
#
# 背景: eas-build.yml (全 push でビルド) を廃止し、
# リリースタイミングでのみ EAS ビルドを実行してコストを最小化する。

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '22'

jobs:
  changesets:
    name: Changesets
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  eas-build:
    name: EAS Build
    needs: changesets
    if: needs.changesets.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Check fingerprint for existing build
        id: fingerprint
        run: |
          HASH=$(npx @expo/fingerprint . | jq -r '.hash')
          echo "Fingerprint hash: $HASH"

          # 同じ fingerprint を持つ完了済みビルドが存在するか確認
          BUILD_ID=$(eas build:list --platform ios --status finished \
            --json --non-interactive --limit 1 \
            --runtimeVersion="$HASH" 2>/dev/null \
            | jq -r '.[0].id // empty') || true

          if [ -n "$BUILD_ID" ]; then
            echo "native-changed=false" >> "$GITHUB_OUTPUT"
            echo "Compatible build found: $BUILD_ID → EAS Update で配信"
          else
            echo "native-changed=true" >> "$GITHUB_OUTPUT"
            echo "No compatible build → フルビルド実行"
          fi

      - name: Decode Apple ASC API Key
        if: steps.fingerprint.outputs.native-changed == 'true'
        run: echo "$EXPO_ASC_API_KEY_P8_BASE64" | base64 -d > ./AuthKey.p8
        env:
          EXPO_ASC_API_KEY_P8_BASE64: ${{ secrets.EXPO_ASC_API_KEY_P8_BASE64 }}

      - name: Build iOS (internal distribution)
        if: steps.fingerprint.outputs.native-changed == 'true'
        run: eas build --platform ios --profile preview --non-interactive
        env:
          EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
          EXPO_ASC_API_KEY_PATH: ./AuthKey.p8
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_APPLE_TEAM_TYPE: ${{ secrets.EXPO_APPLE_TEAM_TYPE }}

      - name: Publish OTA update
        if: steps.fingerprint.outputs.native-changed == 'false'
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          eas update --branch preview \
            --message "Release ${COMMIT_SHA:0:7}" \
            --non-interactive
