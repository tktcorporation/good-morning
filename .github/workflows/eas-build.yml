# EAS Deploy - Fingerprint ベースの条件付きビルド/アップデート
#
# ネイティブコード変更時 → EAS Build（フルビルド、クレジット消費）
# JS/TS のみ変更時    → EAS Update（OTA配信、クレジット消費なし）
#
# Expo Fingerprint がネイティブランタイムのハッシュを比較し、
# 既存ビルドと互換性があれば JS バンドルだけを差し替える。
#
# 前提:
#   GitHub Secrets に以下を設定済み:
#     - EXPO_TOKEN: Expo アクセストークン
#     - EXPO_ASC_KEY_ID / EXPO_ASC_ISSUER_ID / EXPO_ASC_API_KEY_P8_BASE64
#     - EXPO_APPLE_TEAM_ID / EXPO_APPLE_TEAM_TYPE

name: EAS Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: eas-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  fingerprint:
    name: Check Fingerprint
    runs-on: ubuntu-latest
    outputs:
      native-changed: ${{ steps.check.outputs.native-changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Generate fingerprint and check for existing build
        id: check
        run: |
          HASH=$(npx @expo/fingerprint . | jq -r '.hash')
          echo "Fingerprint hash: $HASH"

          # 同じ fingerprint を持つ完了済みビルドが存在するか確認
          BUILD_ID=$(eas build:list --platform ios --status finished \
            --json --non-interactive --limit 1 \
            --runtimeVersion="$HASH" 2>/dev/null \
            | jq -r '.[0].id // empty') || true

          if [ -n "$BUILD_ID" ]; then
            echo "native-changed=false" >> "$GITHUB_OUTPUT"
            echo "Compatible build found: $BUILD_ID → EAS Update で配信"
          else
            echo "native-changed=true" >> "$GITHUB_OUTPUT"
            echo "No compatible build → フルビルド実行"
          fi

  build:
    name: EAS Build (Native)
    needs: fingerprint
    if: needs.fingerprint.outputs.native-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Decode Apple ASC API Key
        run: echo "$EXPO_ASC_API_KEY_P8_BASE64" | base64 -d > ./AuthKey.p8
        env:
          EXPO_ASC_API_KEY_P8_BASE64: ${{ secrets.EXPO_ASC_API_KEY_P8_BASE64 }}

      - name: Build iOS (internal distribution)
        run: eas build --platform ios --profile preview --non-interactive
        env:
          EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
          EXPO_ASC_API_KEY_PATH: ./AuthKey.p8
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_APPLE_TEAM_TYPE: ${{ secrets.EXPO_APPLE_TEAM_TYPE }}

  update:
    name: EAS Update (JS only)
    needs: fingerprint
    if: needs.fingerprint.outputs.native-changed == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          eas update --branch preview \
            --message "Deploy ${COMMIT_SHA:0:7}" \
            --non-interactive
